name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: figback
          POSTGRES_USER: figback
          POSTGRES_PASSWORD: figback
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U figback -d figback"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://figback:figback@localhost:5432/figback
      AUTH_SECRET: ci-auth-secret
      AUTH_GOOGLE_ID: ci-placeholder
      AUTH_GOOGLE_SECRET: ci-placeholder
      CRON_SECRET: ci-cron-secret
      IMAGE_SIGN_SECRET: ci-image-sign-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Prisma migration status
        run: npx prisma migrate status

      - name: Build
        run: npm run build
