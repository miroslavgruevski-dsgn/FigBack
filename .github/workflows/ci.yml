name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/figback
      AUTH_SECRET: ci-auth-secret
      AUTH_GOOGLE_ID: ci-placeholder
      AUTH_GOOGLE_SECRET: ci-placeholder
      CRON_SECRET: ci-cron-secret
      IMAGE_SIGN_SECRET: ci-image-sign-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
